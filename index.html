<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <style>
            body {
                display: flex;
                flex-direction: column;
                min-height: 100vh;
                align-items: center;
                justify-content: center;
                gap: 50px;
            }

            .container {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;;
                align-items: center;

                border-style: solid;
                border-color: red;
                width: 960px;
                height: 960px;
            }

            .grid {
                border-style: solid;
                border-color: cyan;
            }

            button {
                width: 960px;
                height: 100px;
                font-size: 36px;
            }
        </style>
    </head>
    
    <body>
        <button>START GAME</button>
        <div class=container></div>



        <script>
            const container = document.querySelector(".container");
            createGrid(4, container);
            hover();



            const button = document.querySelector("button");
            button.addEventListener("click", event => {
                let gridsPerSide = prompt("Enter number of squares per side for the new grid :");
                if (gridsPerSide > 100) {
                    alert("Invalid input, the maximum number of squares per side is 100");
                    return;
                }

                removeGrid(container);

                createGrid(gridsPerSide, container);
               
                hover();
            });



            function createGrid (gridsPerSide, container) {
                let temp = 0;
                for (let count1=1; count1<=gridsPerSide; count1++) {
                    for (let count2=1; count2<=gridsPerSide; count2++) {
                        const grid = document.createElement("div");
                        grid.classList.add("grid");
                        
                        let containerWidth = parseInt(window.getComputedStyle(container).width);
                        let totalBorderWidth = 2 + 2;
                        let safetyLimit = 0.95; // to prevent the overflow of grid elements out of container
                        grid.style.width = (containerWidth / gridsPerSide - totalBorderWidth) * safetyLimit + "px"; 
                        grid.style.height = grid.style.width;
                        
                        const randomColor = Math.floor(Math.random()*16777215).toString(16);
                        grid.style.background = "#" + randomColor;
                        grid.style.opacity = 0;
                                                
                        container.appendChild(grid);
                    }
                }
                console.log("Grid created " + gridsPerSide + "x" + gridsPerSide);  
            }
            


            function removeGrid (container) {
                while (container.childElementCount > 0 ) {
                    grid = document.querySelector(".grid");
                    container.removeChild(grid);
                }
            }



            function hover () {
                const grids = document.querySelectorAll(".grid");
                grids.forEach((grid) => {
                    grid.addEventListener("mouseover", event => {
                        grid.style.opacity = parseFloat(grid.style.opacity) + 0.1;
                        console.log(grid.style.opacity);
                    });
                });
            }
        </script>
    </body>
</html>
